<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in to GitHub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #0d1117; color: #c9d1d9;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #161b22; padding: 32px;
            border: 1px solid #30363d; border-radius: 6px;
            width: 100%; max-width: 340px;
        }
        .logo { text-align: center; margin-bottom: 24px; font-size: 32px; color: #c9d1d9; }
        h1 { font-size: 24px; font-weight: 400; text-align: center; margin-bottom: 24px; color: #c9d1d9; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        input {
            width: 100%; padding: 8px 12px; margin-bottom: 16px;
            background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
            color: #c9d1d9; font-size: 14px;
        }
        input:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.3); }
        .btn {
            width: 100%; background: #238636; color: white; border: none;
            padding: 10px 20px; font-size: 14px; font-weight: 500;
            border-radius: 6px; cursor: pointer;
        }
        .btn:hover { background: #2ea043; }
        .alt { margin-top: 24px; padding-top: 16px; border-top: 1px solid #30363d; text-align: center; font-size: 14px; }
        .alt a { color: #58a6ff; text-decoration: none; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #6e7681; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⌬</div>
        <h1>Sign in to GitHub</h1>
        <form id="login-form" method="POST" action="/login">
            <label for="login_field">Username or email address</label>
            <input type="text" name="login" id="login_field" required autofocus>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>
            <button type="submit" class="btn">Sign in</button>
        </form>
        <div class="alt">
            <a href="#">Forgot password?</a>
        </div>
    </div>
    <div class="footer">© 2026 GitHub, Inc.</div>
</body>
</html>
